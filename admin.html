  <div class="admin-wrap">
    <div class="admin-header">
      <h2>Inquiry Submissions</h2>
      <div>
        <button class="btn btn-sm" onclick="refresh()" style="margin-right:8px;">Refresh</button>
        <button class="btn btn-sm btn-danger" onclick="clearAll()">Clear All</button>
      </div>
    </div>
    <div id="loading" style="text-align:center;padding:40px;">Loading...</div>
    <table class="admin-table" id="table" style="display:none;">
      <thead>
        <tr>
          <th>Date</th>
          <th>Name</th>
          <th>Email</th>
          <th>Company</th>
          <th>Product</th>
          <th>Message</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty-state" id="empty" style="display:none;">
      <p>No submissions yet.</p>
      <p style="font-size:14px;">Fill out the <a href="/contact.html">contact form</a> to create test data.</p>
    </div>
  </div>

  <script>
    var API = '/api/submissions?key=ads2024';

    function refresh() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('table').style.display = 'none';
      document.getElementById('empty').style.display = 'none';

      fetch(API)
        .then(function (r) { return r.json(); })
        .then(function (data) {
          document.getElementById('loading').style.display = 'none';
          if (!data.length) {
            document.getElementById('empty').style.display = 'block';
            return;
          }
          var tbody = document.getElementById('tbody');
          tbody.innerHTML = '';
          data.reverse().forEach(function (s) {
            var tr = document.createElement('tr');
            tr.innerHTML =
              '<td>' + new Date(s.created_at).toLocaleString() + '</td>' +
              '<td>' + esc(s.name) + '</td>' +
              '<td><a href="mailto:' + esc(s.email) + '">' + esc(s.email) + '</a></td>' +
              '<td>' + esc(s.company || '-') + '</td>' +
              '<td>' + esc(s.product || '-') + '</td>' +
              '<td class="msg-cell">' + esc(s.message) + '</td>';
            tbody.appendChild(tr);
          });
          document.getElementById('table').style.display = '';
        })
        .catch(function () {
          document.getElementById('loading').textContent = 'Failed to load. Make sure to append ?key=ads2024 to the API URL.';
        });
    }

    function clearAll() {
      if (!confirm('Delete all submissions?')) return;
      fetch(API, { method: 'DELETE' })
        .then(function () { refresh(); });
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    refresh();
  </script>
